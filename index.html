<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Querry AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .typing-indicator::after { content: '...'; animation: typing 1.5s infinite steps(4, end); }
        @keyframes typing { 0%, 100% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
    </style>
</head>
<body class="bg-[#131314] text-gray-100 h-[100dvh] flex overflow-hidden font-sans">

    <div id="loginScreen" class="absolute inset-0 bg-[#131314] z-50 flex flex-col items-center justify-center">
        <h1 class="text-4xl font-bold mb-8 text-blue-400">Querry AI</h1>
        <button id="loginBtn" class="bg-gray-200 text-gray-900 px-6 py-3 rounded-full font-semibold flex items-center gap-3 hover:bg-white transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Login dengan Google
        </button>
    </div>

    <div id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 bg-[#1e1f20] border-r border-gray-800 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40 flex flex-col h-[100dvh]">
        <div class="p-4 flex justify-between items-center border-b border-gray-800">
            <h2 class="font-bold text-xl text-blue-400">Querry AI</h2>
            <button id="closeSidebarBtn" class="md:hidden text-gray-400 hover:text-white">&times;</button>
        </div>

        <div class="flex-grow overflow-y-auto p-4">
            <button id="newChatBtn" class="w-full bg-[#282a2c] hover:bg-[#333538] text-white text-sm py-2.5 rounded-full mb-4 flex items-center justify-center gap-2 transition">
                <span>+</span> Chat Baru
            </button>
            <div id="historyList" class="space-y-1 text-sm">
                </div>
        </div>

        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center gap-3 mb-4">
                <img id="sidebarProfilePic" src="" alt="Profile" referrerpolicy="no-referrer" class="w-9 h-9 rounded-full border border-gray-700 object-cover hidden">
                <div class="flex-1 min-w-0">
                    <p id="sidebarDisplayName" class="text-sm font-semibold text-gray-200 truncate"></p>
                    <p class="text-xs text-gray-400 truncate">Online</p>
                </div>
            </div>
            <button id="logoutBtn" class="text-red-400 text-sm hover:text-red-300 w-full text-left flex items-center gap-2 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </div>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-60 z-30 hidden md:hidden"></div>

    <div class="flex-1 flex flex-col h-[100dvh] w-full relative">
        <header class="flex-none h-14 flex items-center justify-between px-4 border-b border-gray-800 bg-[#131314]">
            <button id="menuBtn" class="text-gray-300 md:hidden hover:bg-gray-800 p-2 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="w-6 hidden md:block"></div> 
            <span class="font-semibold text-gray-200 text-lg">Querry AI</span>
            <img id="headerProfilePic" src="" alt="User" referrerpolicy="no-referrer" class="w-8 h-8 rounded-full border border-gray-700 object-cover hidden">
        </header>

        <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-24 md:py-8 space-y-8">
            <div class="text-center text-gray-500 mt-20" id="welcomeMsg">
                <div class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-4">Halo, ada yang bisa saya bantu?</div>
                Ketik prompt di bawah untuk memulai percakapan.
            </div>
        </div>

        <div class="flex-none bg-[#131314] p-4 md:px-24 pb-6">
            <div class="max-w-4xl mx-auto relative flex items-end bg-[#1e1f20] rounded-3xl p-3 shadow-lg focus-within:bg-[#282a2c] transition-colors">
                <textarea id="promptInput" rows="1" placeholder="Masukkan prompt di sini..." class="flex-1 bg-transparent text-gray-200 resize-none max-h-40 p-2 focus:outline-none"></textarea>
                
                <div class="flex flex-col justify-end pb-1 pl-2">
                    <button id="sendBtn" class="text-gray-400 hover:text-white p-2 bg-gray-800 hover:bg-gray-700 rounded-full transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                    <button id="cancelBtn" class="hidden text-gray-400 hover:text-red-400 p-2 bg-gray-800 hover:bg-gray-700 rounded-full transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getDocs, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // ==========================================
        // MASUKKAN API KEY GEMINI KAMU DI SINI
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyCHMQSpcPKPlV0rt5oUFFPwqNMr5LCC7tI"; 

        const firebaseConfig = {
            apiKey: "AIzaSyDUs1G-nzJwL78GsaUQX-BmbRz6QSW6_kU",
            authDomain: "testing-eb8f6.firebaseapp.com",
            projectId: "testing-eb8f6",
            storageBucket: "testing-eb8f6.firebasestorage.app",
            messagingSenderId: "264152153312",
            appId: "1:264152153312:web:75fbc799ee8bd4fa5f2485"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentChatId = null;
        let chatContext = []; 
        let currentAbortController = null;

        const DOM = {
            loginScreen: document.getElementById('loginScreen'),
            loginBtn: document.getElementById('loginBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            menuBtn: document.getElementById('menuBtn'),
            closeSidebarBtn: document.getElementById('closeSidebarBtn'),
            historyList: document.getElementById('historyList'),
            newChatBtn: document.getElementById('newChatBtn'),
            chatBox: document.getElementById('chatBox'),
            welcomeMsg: document.getElementById('welcomeMsg'),
            promptInput: document.getElementById('promptInput'),
            sendBtn: document.getElementById('sendBtn'),
            cancelBtn: document.getElementById('cancelBtn'),
            headerProfilePic: document.getElementById('headerProfilePic'),
            sidebarProfilePic: document.getElementById('sidebarProfilePic'),
            sidebarDisplayName: document.getElementById('sidebarDisplayName')
        };

        DOM.loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        DOM.logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                DOM.loginScreen.classList.add('hidden');
                
                const userName = user.displayName || 'Guest User';
                // Jika foto tidak ada, gunakan inisial
                const userPhoto = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=374151&color=fff`;
                
                DOM.headerProfilePic.src = userPhoto;
                DOM.headerProfilePic.classList.remove('hidden');
                DOM.sidebarProfilePic.src = userPhoto;
                DOM.sidebarProfilePic.classList.remove('hidden');
                DOM.sidebarDisplayName.innerText = userName;

                await loadHistory();
                startNewChat();
            } else {
                currentUser = null;
                DOM.loginScreen.classList.remove('hidden');
                DOM.headerProfilePic.classList.add('hidden');
                DOM.sidebarProfilePic.classList.add('hidden');
            }
        });

        async function loadHistory() {
            DOM.historyList.innerHTML = '<span class="text-gray-500 text-xs px-2">Memuat history...</span>';
            const q = query(collection(db, "users", currentUser.uid, "chats"), orderBy("updatedAt", "desc"));
            const querySnapshot = await getDocs(q);
            DOM.historyList.innerHTML = '';
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const title = data.title || "Percakapan Baru";
                const btn = document.createElement('button');
                btn.className = "w-full text-left truncate px-3 py-2 hover:bg-[#282a2c] rounded-lg text-gray-300 transition";
                btn.innerText = title;
                btn.onclick = () => loadSpecificChat(docSnap.id, data.messages);
                DOM.historyList.appendChild(btn);
            });
        }

        function startNewChat() {
            currentChatId = Date.now().toString(); 
            chatContext = [];
            renderChat();
            if(window.innerWidth < 768) toggleSidebar();
        }
        DOM.newChatBtn.onclick = startNewChat;

        function loadSpecificChat(chatId, messages) {
            currentChatId = chatId;
            chatContext = messages || [];
            renderChat();
            if(window.innerWidth < 768) toggleSidebar();
        }

        // ==========================================
        // PARSER MARKDOWN & SALIN KODE
        // ==========================================
        function formatMarkdownToHTML(text) {
            let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            const codeBlocks = [];
            escaped = escaped.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                codeBlocks.push({ lang: lang || 'Kode', code: code.trim() });
                return `%%%CODE_BLOCK_${codeBlocks.length - 1}%%%`;
            });

            escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong class="text-gray-100">$1</strong>');
            escaped = escaped.replace(/`([^`]+)`/g, '<code class="bg-[#1e1e1e] border border-gray-700 text-gray-200 px-1.5 py-0.5 rounded text-sm font-mono">$1</code>');
            escaped = escaped.replace(/\n/g, '<br>');

            codeBlocks.forEach((block, index) => {
                const safeCodeForAttr = encodeURIComponent(block.code); 
                const blockHTML = `
                <div class="my-4 rounded-xl overflow-hidden bg-[#1e1f20] border border-gray-700 text-left font-sans">
                    <div class="flex items-center justify-between px-4 py-2 bg-[#282a2c] text-xs">
                        <span class="text-gray-400 font-semibold uppercase tracking-wider">${block.lang}</span>
                        <button onclick="copyCodeBtn(this, '${safeCodeForAttr}')" class="flex items-center gap-1.5 text-gray-400 hover:text-gray-100 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            <span class="copy-text">Salin kode</span>
                        </button>
                    </div>
                    <div class="p-4 overflow-x-auto">
                        <pre class="font-mono text-sm text-blue-300"><code>${block.code}</code></pre>
                    </div>
                </div>`;
                escaped = escaped.replace(`%%%CODE_BLOCK_${index}%%%`, blockHTML);
            });

            return escaped;
        }

        window.copyCodeBtn = (btnElement, encodedText) => {
            const rawText = decodeURIComponent(encodedText);
            navigator.clipboard.writeText(rawText).then(() => {
                const span = btnElement.querySelector('.copy-text');
                const originalText = span.innerText;
                span.innerText = 'Tersalin!';
                btnElement.classList.add('text-green-400');
                
                setTimeout(() => {
                    span.innerText = originalText;
                    btnElement.classList.remove('text-green-400');
                }, 2000);
            });
        };

        function renderChat() {
            DOM.chatBox.innerHTML = '';
            if (chatContext.length === 0) {
                DOM.chatBox.appendChild(DOM.welcomeMsg);
                DOM.welcomeMsg.style.display = 'block';
                return;
            }
            DOM.welcomeMsg.style.display = 'none';

            chatContext.forEach((msg, index) => {
                const div = document.createElement('div');
                const isUser = msg.role === 'user';
                
                div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'}`;
                
                let contentHTML = "";
                if (isUser) {
                    contentHTML = `
                    <div class="max-w-[85%] rounded-3xl rounded-tr-sm p-4 bg-[#282a2c] text-gray-100">
                        <p class="whitespace-pre-wrap leading-relaxed">${msg.content}</p>
                        <button onclick="editMessage(${index})" class="text-xs text-blue-400 mt-2 hover:underline inline-flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> Edit
                        </button>
                    </div>`;
                } else {
                    const formattedText = formatMarkdownToHTML(msg.content);
                    contentHTML = `
                    <div class="w-full flex gap-4 text-gray-200">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center flex-shrink-0 mt-1">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L14.8 9.2L22 12L14.8 14.8L12 22L9.2 14.8L2 12L9.2 9.2L12 2Z"/></svg>
                        </div>
                        <div class="flex-1 min-w-0 leading-relaxed overflow-hidden">
                            ${formattedText}
                            ${index === chatContext.length - 1 ? `
                            <div class="mt-4 flex gap-2">
                                <button onclick="regenerateResponse()" class="text-xs text-gray-400 border border-gray-700 px-3 py-1 rounded-full hover:bg-gray-800 hover:text-white inline-flex items-center gap-1 transition">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Ulangi
                                </button>
                            </div>` : ''}
                        </div>
                    </div>`;
                }
                
                div.innerHTML = contentHTML;
                DOM.chatBox.appendChild(div);
            });
            DOM.chatBox.scrollTop = DOM.chatBox.scrollHeight;
        }

        window.editMessage = (index) => {
            if(currentAbortController) currentAbortController.abort();
            DOM.promptInput.value = chatContext[index].content;
            chatContext = chatContext.slice(0, index);
            renderChat();
            DOM.promptInput.focus();
        };

        window.regenerateResponse = () => {
            if(currentAbortController) currentAbortController.abort();
            chatContext.pop(); 
            renderChat();
            const lastUserMsg = chatContext[chatContext.length - 1];
            generateAIResponse(lastUserMsg.content, true);
        };

        DOM.promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        DOM.sendBtn.onclick = () => {
            const text = DOM.promptInput.value.trim();
            if (!text) return;
            
            if (GEMINI_API_KEY === "MASUKKAN_API_KEY_DISINI" || !GEMINI_API_KEY) {
                alert("Kamu belum memasukkan API Key Gemini di dalam kode HTML-nya!");
                return;
            }
            
            chatContext.push({ role: "user", content: text });
            DOM.promptInput.value = '';
            DOM.promptInput.style.height = 'auto';
            renderChat();
            generateAIResponse(text, false);
        };

        async function generateAIResponse(userText, isRegenerating) {
            toggleLoadingState(true);

            const loadingDiv = document.createElement('div');
            loadingDiv.id = "loadingBox";
            loadingDiv.className = "flex justify-start w-full";
            loadingDiv.innerHTML = `
                <div class="flex gap-4 text-gray-400">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center animate-pulse mt-1">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L14.8 9.2L22 12L14.8 14.8L12 22L9.2 14.8L2 12L9.2 9.2L12 2Z"/></svg>
                    </div>
                    <div class="typing-indicator text-sm font-mono mt-2">Berpikir</div>
                </div>`;
            DOM.chatBox.appendChild(loadingDiv);
            DOM.chatBox.scrollTop = DOM.chatBox.scrollHeight;

            currentAbortController = new AbortController();

            try {
                const geminiMessages = chatContext.map(msg => ({
                    role: msg.role === 'user' ? 'user' : 'model',
                    parts: [{ text: msg.content }]
                }));

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: geminiMessages }),
                    signal: currentAbortController.signal
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "Gagal menghubungi Gemini API.");
                }
                
                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
                
                chatContext.push({ role: "assistant", content: aiReply });
                renderChat();
                saveContextToFirestore(); 

            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Dibatalkan user.');
                } else {
                    alert("Error: " + error.message);
                    if(!isRegenerating) chatContext.pop(); 
                    renderChat();
                }
            } finally {
                toggleLoadingState(false);
                const loader = document.getElementById('loadingBox');
                if(loader) loader.remove();
            }
        }

        async function saveContextToFirestore() {
            if(!currentUser || chatContext.length === 0) return;
            const title = chatContext.find(m => m.role === 'user')?.content.substring(0, 30) + "..." || "Percakapan Baru";

            const chatRef = doc(db, "users", currentUser.uid, "chats", currentChatId);
            await setDoc(chatRef, {
                title: title,
                messages: chatContext,
                updatedAt: serverTimestamp()
            }, { merge: true });
            
            loadHistory(); 
        }

        DOM.cancelBtn.onclick = () => {
            if(currentAbortController) {
                currentAbortController.abort();
                toggleLoadingState(false);
                const loader = document.getElementById('loadingBox');
                if(loader) loader.remove();
                
                const cancelledPrompt = chatContext.pop();
                DOM.promptInput.value = cancelledPrompt.content;
                renderChat();
            }
        };

        function toggleLoadingState(isLoading) {
            if(isLoading) {
                DOM.sendBtn.classList.add('hidden');
                DOM.cancelBtn.classList.remove('hidden');
            } else {
                DOM.sendBtn.classList.remove('hidden');
                DOM.cancelBtn.classList.add('hidden');
            }
        }

        function toggleSidebar() {
            DOM.sidebar.classList.toggle('-translate-x-full');
            DOM.sidebarOverlay.classList.toggle('hidden');
        }
        DOM.menuBtn.onclick = toggleSidebar;
        DOM.closeSidebarBtn.onclick = toggleSidebar;
        DOM.sidebarOverlay.onclick = toggleSidebar;

        DOM.promptInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                DOM.sendBtn.click();
            }
        });

    </script>
</body>
</html>
